# ==============================================================================
# API Tier — Backend + Redis
# ==============================================================================
# Machine A: Backend API server with local Redis for caching
#
# Usage:
#   docker-compose -f docker-compose.api-tier.yml --env-file .env.api-tier up -d
# ==============================================================================

services:
  backend:
    build:
      context: ../../../
      dockerfile: fastapi-backend/Dockerfile
    env_file:
      - .env.api-tier
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE=postgresql
      - DB_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:-}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - EDGE_URL=${EDGE_URL:-http://edge:3002}
      - EDGE_SSR_URL=${EDGE_URL:-http://edge:3002}
      - REDIS_URL=${REDIS_URL:-redis://${CACHE_PROVIDER:-redis}:6379}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Dynamic Auth Provider
      - AUTH_PROVIDER=${AUTH_PROVIDER:-supabase}
      # Supabase Auth Credentials (used if AUTH_PROVIDER=supabase)
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # SuperTokens (used if AUTH_PROVIDER=supertokens). This tier has NO local
      # supertokens core — point SUPERTOKENS_URI at where you run one, and set
      # SUPERTOKENS_API_KEY to match that core's API_KEYS (charset: alphanumerics,
      # '-' and '=' ONLY — underscores crash the core at boot).
      - SUPERTOKENS_URI=${SUPERTOKENS_URI:-}
      - SUPERTOKENS_API_KEY=${SUPERTOKENS_API_KEY:-}
    volumes:
      - backend_data:/app/data
    networks:
      - frontbase-api
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    # NOTE: The previous SRH_* vars + port-80 mapping targeted the Serverless
    # Redis HTTP (SRH) sidecar image, which plain redis:alpine silently ignores.
    # If you need the Redis-over-HTTP API, swap to an SRH image
    # (e.g. hiett/serverless-redis-http) and restore those settings.
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - frontbase-api
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Alternative: Dragonfly (Drop-in Redis Replacement) ---
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    profiles: ["dragonfly"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    ulimits:
      memlock: -1
    volumes:
      - redis_data:/data
    networks:
      - frontbase-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontbase-api:
    driver: bridge

volumes:
  backend_data:
  redis_data:
