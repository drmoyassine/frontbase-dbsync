version: '3.8'

# ==============================================================================
# FRONTBASE CLOUD DOCKER COMPOSE 
# ==============================================================================
#
# Multi-tenant SaaS mode — backend connects to Supabase Postgres,
# edge has embedded Redis, backend has its own Redis container.
#
# Usage: docker-compose -f docker-compose.cloud.yml up -d
#
# ==============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: fastapi-backend/Dockerfile
    expose:
      - "8000"
    environment:
      - DEPLOYMENT_MODE=cloud
      # Database: Supabase Postgres connection string
      - DATABASE_URL=${DATABASE_URL}
      # Legacy DB config (unused when DATABASE_URL is set, kept for compat)
      - DATABASE=${COMPOSE_PROFILES:-sqlite}
      - DB_PASSWORD=${DB_PASSWORD:-frontbase-dev-password}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # Edge Engine URL (override for distributed deployment)
      - EDGE_URL=${EDGE_URL:-http://edge:3002}
      - EDGE_SSR_URL=${EDGE_URL:-http://edge:3002}
      # Backend Redis (control plane caching)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Admin Authentication (master admin)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@frontbase.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  celery-worker:
    build:
      context: .
      dockerfile: fastapi-backend/Dockerfile
    command: celery -A app.services.task_queue worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE=${COMPOSE_PROFILES:-sqlite}
      - DB_PASSWORD=${DB_PASSWORD:-frontbase-dev-password}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL — only starts when COMPOSE_PROFILES=postgresql
  postgres:
    image: postgres:16-alpine
    profiles: [ "postgresql" ]
    environment:
      POSTGRES_USER: frontbase
      POSTGRES_PASSWORD: ${DB_PASSWORD:-frontbase-dev-password}
      POSTGRES_DB: frontbase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U frontbase" ]
      interval: 10s
      timeout: 5s
      retries: 5

  edge:
    build:
      context: .
      dockerfile: services/edge/Dockerfile
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - FRONTBASE_DEPLOYMENT_MODE=cloud
      - PORT=${EDGE_PORT:-3002}
      # Edge has embedded Redis — no external cache config needed for Docker
      # Database for edge storage (SQLite fallback)
      - SQLITE_PATH=/app/data/edge.db
      - DATABASE_URL=file:/app/data/edge.db
      - FRONTBASE_STATE_DB={"provider":"sqlite"}
      - PAGES_DB_URL=${PAGES_DB_URL:-file:/app/data/pages.db}
      # Backend URL (override for distributed deployment)
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      # Webhook API keys (comma-separated)
      - API_KEYS=${API_KEYS:-}
      # Public URL for preview links (set PRIMARY_DOMAIN or leave empty for auto-detect)
      - PUBLIC_URL=${PRIMARY_DOMAIN:+https://${PRIMARY_DOMAIN}}
    volumes:
      - edge_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Empty = use relative URLs (recommended for production)
        VITE_API_URL: ""
        VITE_DEPLOYMENT_MODE: "cloud"
    expose:
      - "80"
    environment:
      - DEPLOYMENT_MODE=cloud
    depends_on:
      - backend
      - edge
    restart: unless-stopped


  # Backend Redis — control plane caching only.
  # Edge engines have their own embedded Redis.
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # SuperTokens — Identity and Access Management
  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.0
    expose:
      - "3567"
    environment:
      POSTGRESQL_CONNECTION_URI: ${SUPERTOKENS_DB_URL:-${DATABASE_URL:-postgresql://frontbase:frontbase-dev-password@postgres:5432/frontbase}}
      API_KEYS: ${SUPERTOKENS_API_KEY:-frontbase-dev-secret-key-change-me}
      # Required for multi-tenancy
      ENABLE_MULTI_TENANCY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend_data:
  postgres_data:
  edge_data:
  redis_data:
