# ==============================================================================
# FRONTBASE CLOUD DOCKER COMPOSE
# ==============================================================================
#
# Multi-tenant SaaS mode. BATTERIES INCLUDED BY DEFAULT:
#   postgres + supertokens + redis ALWAYS run — `docker compose up -d` gives a
#   fully working stack (DB, auth, cache) with ZERO env vars set.
#
# Opt-in alternatives (set env vars to switch):
#   - Supabase Postgres:  DATABASE_URL=<supabase connection string>
#   - Supabase Auth:      AUTH_PROVIDER=supabase + SUPABASE_* keys
#   - Dragonfly cache:    COMPOSE_PROFILES=dragonfly + CACHE_PROVIDER=dragonfly
#   (The default containers keep running but sit idle when overridden —
#    deliberately: NO service is profile-gated, so a missing/typo'd env var
#    can never silently delete your auth stack again.)
#
# Usage: docker compose -f docker-compose.cloud.yml up -d
#
# ==============================================================================

services:
  backend:
    build:
      context: ../../../
      dockerfile: fastapi-backend/Dockerfile
    # NOTE: no `user:` override here — the entrypoint MUST boot as root so it can
    # chown legacy root-owned SQLite volumes (self-healing), then it drops to
    # appuser (UID 1000) via gosu before starting uvicorn/celery. Forcing
    # user: "1000:1000" defeats that and traps old volumes in a readonly crash loop.
    expose:
      - "8000"
    environment:
      - DEPLOYMENT_MODE=cloud
      # Database. DEFAULT: the built-in postgres container (always running).
      # To use Supabase/external Postgres, set DATABASE_URL to its connection
      # string. Keep the password in sync with DB_PASSWORD when using the default.
      - DATABASE_URL=${DATABASE_URL:-postgresql://frontbase:${DB_PASSWORD:-frontbase}@postgres:5432/frontbase}
      - DB_PASSWORD=${DB_PASSWORD:-frontbase}
      - SECRET_KEY=${SECRET_KEY}
      # Fernet encryption key for credentials-at-rest. Optional: if unset, the
      # backend auto-generates one and persists it to the backend_data volume
      # (survives redeploys). Set explicitly when the DB is external — losing
      # the volume while data lives elsewhere orphans every stored credential.
      - FERNET_KEY=${FERNET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # Edge Engine URL (override for distributed deployment)
      - EDGE_URL=${EDGE_URL:-http://edge:3002}
      - EDGE_SSR_URL=${EDGE_URL:-http://edge:3002}
      # Backend Redis (control plane caching)
      - REDIS_URL=${REDIS_URL:-redis://${CACHE_PROVIDER:-redis}:6379}
      # Admin Authentication (master admin)
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Email Platform Settings
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_REGION=${MAILGUN_REGION}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      # Frontend and Backend URLs for SuperTokens links
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      # Observability — Sentry error tracking (optional; unset = off)
      - SENTRY_DSN=${SENTRY_DSN:-}
      # Dynamic Auth Provider
      - AUTH_PROVIDER=${AUTH_PROVIDER:-supertokens}
      # Supabase Auth Credentials (used if AUTH_PROVIDER=supabase)
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # SuperTokens core API key — MUST match the supertokens core's API_KEYS. Shared
      # internal default → zero-config cloud login; override via SUPERTOKENS_API_KEY.
      # ⚠️  Charset: alphanumerics, '-' and '=' ONLY — an underscore crashes the core.
      - SUPERTOKENS_API_KEY=${SUPERTOKENS_API_KEY:-fb-internal-supertokens-key}
      # Where the backend reaches the core. Default = the local supertokens service;
      # override to use an external/managed core (then omit the local profile).
      - SUPERTOKENS_URI=${SUPERTOKENS_URI:-http://supertokens:3567}
      # System key for backend->edge management traffic (x-system-key). The
      # backend injects this into the Local Edge engine's config; the edge
      # container gets the SAME value below. Shared internal default —
      # override to harden (both sides pick it up on recreate).
      - FRONTBASE_SYSTEM_KEY=${FRONTBASE_SYSTEM_KEY:-fb_sys_local_dev_key}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s


  # PostgreSQL — DEFAULT, always on (no profile gate). This is the built-in DB
  # for the backend AND the SuperTokens core. To use Supabase instead, set
  # DATABASE_URL — this container then sits idle (supertokens still uses it).
  # ⚠️  Deliberately NOT profile-gated: a missing COMPOSE_PROFILES var used to
  # silently skip this service and `up --remove-orphans` deleted the running
  # container → auth died. Never again.
  # NOTE: the password is baked into postgres_data on FIRST boot — changing
  # DB_PASSWORD later requires recreating the volume (or ALTER USER).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frontbase
      POSTGRES_PASSWORD: ${DB_PASSWORD:-frontbase}
      POSTGRES_DB: frontbase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U frontbase" ]
      interval: 10s
      timeout: 5s
      retries: 5

  edge:
    build:
      context: ../../../
      dockerfile: services/edge/Dockerfile
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - FRONTBASE_DEPLOYMENT_MODE=cloud
      - PORT=${EDGE_PORT:-3002}
      # Edge has embedded Redis — no external cache config needed for Docker
      # Database for edge storage (SQLite fallback)
      - SQLITE_PATH=/app/data/edge.db
      - DATABASE_URL=file:/app/data/edge.db
      - FRONTBASE_STATE_DB={"provider":"sqlite"}
      - PAGES_DB_URL=${PAGES_DB_URL:-file:/app/data/pages.db}
      # Internal address edge uses to reach the backend (startup sync, etc.).
      # Distinct from the backend's own BACKEND_URL (its PUBLIC url, used for
      # SuperTokens email links) — do NOT set EDGE_BACKEND_URL to the public URL.
      - BACKEND_URL=${EDGE_BACKEND_URL:-http://backend:8000}
      # Webhook API keys (comma-separated)
      - API_KEYS=${API_KEYS:-}
      # System key for local backend-to-edge management traffic (x-system-key
      # auth + local-vault encryption). MUST match what the backend injects into
      # the Local Edge engine config (fastapi-backend/main.py reads the same
      # FRONTBASE_SYSTEM_KEY). Shared internal default = zero-config; override
      # via FRONTBASE_SYSTEM_KEY to harden — BOTH containers pick it up.
      - FRONTBASE_API_KEYS={"systemKey":"${FRONTBASE_SYSTEM_KEY:-fb_sys_local_dev_key}"}
      - FRONTBASE_SYSTEM_KEY=${FRONTBASE_SYSTEM_KEY:-fb_sys_local_dev_key}
      # Public URL for preview links (set PRIMARY_DOMAIN or leave empty for auto-detect)
      - PUBLIC_URL=${PRIMARY_DOMAIN:+https://${PRIMARY_DOMAIN}}
      # Observability — Sentry error tracking (optional; unset = off)
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - edge_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../../../
      dockerfile: Dockerfile.frontend
      args:
        # Empty = use relative URLs (recommended for production)
        VITE_API_URL: ""
        VITE_DEPLOYMENT_MODE: "cloud"
        # Observability (optional — sourced from the host .env; empty = off).
        # NOTE: these are build-time args → rebuilding the frontend image is required.
        VITE_SENTRY_DSN: "${VITE_SENTRY_DSN:-}"
        VITE_POSTHOG_KEY: "${VITE_POSTHOG_KEY:-}"
        # EU projects: set VITE_POSTHOG_HOST=https://eu.i.posthog.com in the host .env
        VITE_POSTHOG_HOST: "${VITE_POSTHOG_HOST:-}"
        # Supabase Builder Auth (Only baked in if provided)
        VITE_SUPABASE_URL: "${SUPABASE_URL:-}"
        VITE_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
    expose:
      - "80"
    environment:
      - DEPLOYMENT_MODE=cloud
    depends_on:
      - backend
      - edge
    restart: unless-stopped


  # Backend Redis — control plane caching only. DEFAULT, always on (no profile
  # gate — see postgres note). Edge engines have their own embedded Redis.
  # To use Dragonfly instead: COMPOSE_PROFILES=dragonfly + CACHE_PROVIDER=dragonfly
  # (this container then sits idle).
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Alternative: Dragonfly (Drop-in Redis Replacement, opt-in) ---
  # Enable: COMPOSE_PROFILES=dragonfly + CACHE_PROVIDER=dragonfly (the backend's
  # REDIS_URL then targets dragonfly:6379). Own volume — the always-on redis
  # keeps redis_data; running both against one volume corrupts it.
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    profiles: ["dragonfly"]
    expose:
      - "6379"
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SuperTokens — Identity and Access Management. DEFAULT, always on (no
  # profile gate — see postgres note). When AUTH_PROVIDER=supabase, the backend
  # never calls it and this container sits idle.
  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:latest
    expose:
      - "3567"
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://frontbase:${DB_PASSWORD:-frontbase}@postgres:5432/frontbase
      POSTGRESQL_TABLE_SCHEMA: supertokens
      # Core + backend MUST share the same API key. Both read SUPERTOKENS_API_KEY with
      # one shared INTERNAL default, so cloud login works with ZERO config; set
      # SUPERTOKENS_API_KEY in production to harden (both sides pick it up automatically).
      # The core is expose-only (network-isolated, NOT ports-published), so this default
      # is internal plumbing — the same posture as fb_sys_local_dev_key — not a reachable
      # credential. This restores the proven pre-scrub agreement: an empty/absent
      # API_KEYS is fragile across core versions and deploy platforms (a set-but-empty
      # value makes the core 401 every request, a plain-absent one only works on some
      # platforms), so an explicit shared key is the robust choice.
      # ⚠️  Key charset: alphanumerics, '-' and '=' ONLY. An underscore (or any other
      # character) makes the core CRASH-LOOP at boot with "Invalid characters in API
      # key" — the service appears to vanish. Verified locally 2026-07-05.
      API_KEYS: ${SUPERTOKENS_API_KEY:-fb-internal-supertokens-key}
      ENABLE_MULTI_TENANCY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend_data:
  postgres_data:
  edge_data:
  redis_data:
  dragonfly_data:
