# ==============================================================================
# Core Tier — Backend + Edge Engine (No Builder UI)
# ==============================================================================
# Used when hosting the Builder SPA externally (e.g. Cloudflare Worker) but 
# running the core computation services (API + Edge) together on a VPS.
#
# Usage:
#   docker-compose -f docker-compose.core-tier.yml --env-file .env.core-tier up -d
# ==============================================================================

version: '3.8'

services:
  backend:
    build:
      context: ../../../
      dockerfile: fastapi-backend/Dockerfile
    env_file:
      - .env.core-tier
    expose:
      - "8000"
    environment:
      - DEPLOYMENT_MODE=cloud
      - DATABASE=postgresql
      - DB_PASSWORD=${DB_PASSWORD:-frontbase-dev-password}
      - DATABASE_URL=${DATABASE_URL:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - EDGE_URL=http://edge:3002
      - EDGE_SSR_URL=http://edge:3002
      - REDIS_URL=redis://${CACHE_PROVIDER:-redis}:6379
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@frontbase.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Dynamic Auth Provider
      - AUTH_PROVIDER=${AUTH_PROVIDER:-supabase}
      # Supabase Auth Credentials
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  edge:
    build:
      context: ../../../
      dockerfile: services/edge/Dockerfile
    env_file:
      - .env.core-tier
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - FRONTBASE_DEPLOYMENT_MODE=cloud
      - PORT=3002
      - SQLITE_PATH=/app/data/edge.db
      - DATABASE_URL=file:/app/data/edge.db
      - FRONTBASE_STATE_DB={"provider":"sqlite"}
      - PAGES_DB_URL=${PAGES_DB_URL:-file:/app/data/pages.db}
      - BACKEND_URL=http://backend:8000
    volumes:
      - edge_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    profiles: ["dragonfly"]
    expose:
      - "6379"
    ulimits:
      memlock: -1
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway to split traffic correctly between backend and edge
  api-gateway:
    image: nginx:alpine
    ports:
      - "${API_GATEWAY_PORT:-8080}:80"
    volumes:
      - ../../../nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - edge
    restart: unless-stopped

volumes:
  backend_data:
  edge_data:
  redis_data:
