# ==============================================================================
# FRONTBASE STANDALONE EDGE NODE
# ==============================================================================
#
# Deploys a single Edge Engine node that connects to remote Turso + Upstash.
# No FastAPI backend, Postgres, or Redis container needed.
#
# Usage:
#   1. Create a Turso database and run turso-schema.sql
#   2. Copy .env.standalone.example -> .env
#   3. docker-compose -f docker-compose.standalone-edge.yml up -d
#
# ==============================================================================

services:
  edge:
    build:
      context: .
      dockerfile: services/edge/Dockerfile.standalone
    # Or use a published image:
    # image: frontbase/edge-node:latest
    ports:
      - "${EDGE_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      # Storage provider (must be 'cloud' for standalone)
      - FRONTBASE_DEPLOYMENT_MODE=cloud
      
      # Optional external providers.
      # FRONTBASE_STATE_DB defaults to local SQLite (bootstrap — the vault
      # itself lives in this DB, so it cannot come from the vault).
      - FRONTBASE_STATE_DB=${FRONTBASE_STATE_DB:-{"provider":"sqlite"}}
      # CACHE / QUEUE / AUTH are intentionally left EMPTY unless set in .env:
      # when empty the engine falls back to {provider:"none"}, but the local
      # vault (POST /api/config/secrets) can populate them at runtime. Setting
      # a value in .env still wins (manual override precedence). See
      # docs/edge-local-vault.md.
      - FRONTBASE_CACHE=${FRONTBASE_CACHE:-}
      - FRONTBASE_QUEUE=${FRONTBASE_QUEUE:-}
      - FRONTBASE_AUTH=${FRONTBASE_AUTH:-}
      
      # Edge database (auto-mounted by volume)
      - SQLITE_PATH=/app/data/edge.db
      - DATABASE_URL=file:/app/data/edge.db
      - PAGES_DB_URL=file:/app/data/pages.db
      
      # System key for backend-to-edge management traffic (MUST match backend)
      - FRONTBASE_API_KEYS={"systemKey":"${FRONTBASE_SYSTEM_KEY:-}"}
      
      # Public URL for preview links
      - PUBLIC_URL=${PRIMARY_DOMAIN:+https://${PRIMARY_DOMAIN}}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
